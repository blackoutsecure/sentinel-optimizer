name: Promotion Gate (dev -> main)

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-fast-forward-promotion:
    name: Verify dev can fast-forward main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch dev and main
        run: git fetch origin dev main --prune

      - name: Validate fast-forward path
        run: |
          set -euo pipefail
          BASE="$(git merge-base origin/main origin/dev)"
          MAIN_SHA="$(git rev-parse origin/main)"
          if [ "$BASE" != "$MAIN_SHA" ]; then
            echo "main is not an ancestor of dev."
            echo "Use a sync PR from main -> dev or resolve divergence before promoting dev -> main."
            exit 1
          fi
          echo "Fast-forward promotion path is valid (main is ancestor of dev)."